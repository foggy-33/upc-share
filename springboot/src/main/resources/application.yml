server:
  port: 8080
  forward-headers-strategy: native
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:300}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:20}
    accept-count: ${TOMCAT_ACCEPT_COUNT:500}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:10000}

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:download_site}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:download_site}
    password: ${MYSQL_PASSWORD:change-me}
    hikari:
      pool-name: DownloadSiteHikari
      maximum-pool-size: ${DB_POOL_MAX:40}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:3000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${DB_LEAK_DETECTION_MS:0}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      encoding: UTF-8
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:1GB}
      max-request-size: ${MAX_REQUEST_SIZE:1100MB}
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

app:
  resources-dir: ${RESOURCES_DIR:../resources}
  jwt-secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
  node-name: ${NODE_NAME:campus}
  cookie-domain: ${COOKIE_DOMAIN:}
  cookie-secure: ${COOKIE_SECURE:false}
  scan-resources-on-startup: ${SCAN_RESOURCES_ON_STARTUP:true}
