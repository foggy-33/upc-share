<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传管理 - 学科资料站</title>
    <link rel="stylesheet" href="/static/css/style.css?v=20260301">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                <span>upc-share</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">返回首页</a>
                <span class="nav-link" style="color:var(--text-tertiary);">{{ user.username }}</span>
                <a href="#" class="nav-link" onclick="logout()">退出</a>
            </div>
        </div>
    </nav>

    <section class="admin-section">
        <div class="container">
            <h1 class="admin-title">上传资料</h1>
            <p class="admin-subtitle">支持 PDF、Word、PPT、Excel、ZIP、RAR 等格式，单文件最大 500MB</p>

            <div class="admin-grid">
                <!-- 上传卡片 -->
                <div class="upload-card">
                    <div class="upload-zone" id="uploadZone">
                        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p class="upload-text">拖拽文件到此处，或 <span class="upload-browse">点击选择</span></p>
                        <p class="upload-hint">pdf / doc / docx / ppt / xls / zip / rar / 7z</p>
                        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.zip,.rar,.7z,.tar,.gz,.txt,.md,.csv" hidden>
                    </div>

                    <div class="upload-form" id="uploadForm" style="display:none;">
                        <div class="file-preview" id="filePreview">
                            <div class="file-preview-icon" id="filePreviewIcon">PDF</div>
                            <div class="file-preview-info">
                                <span class="file-preview-name" id="filePreviewName"></span>
                                <span class="file-preview-size" id="filePreviewSize"></span>
                            </div>
                            <button class="file-preview-remove" id="removeFile">&times;</button>
                        </div>

                        <div class="form-group">
                            <label class="form-label">学科分类 *</label>
                            <input type="text" id="fileCategory" class="form-input" placeholder="例如：高等数学、大学物理、数据结构...">
                        </div>

                        <div class="form-group">
                            <label class="form-label">子目录（可选）</label>
                            <input type="text" id="fileSubCategory" class="form-input" placeholder="例如：课件、习题、笔记...">
                        </div>

                        <button class="btn-upload" id="uploadBtn">
                            <span class="btn-text">上传文件</span>
                            <div class="btn-loader" style="display:none;"></div>
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 学科资料共享站 · Powered by FastAPI</p>
        </div>
    </footer>

    <script>
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            location.href = '/';
        }
    </script>
    <script src="/static/js/admin.js?v=20260301"></script>
</body>
</html>
