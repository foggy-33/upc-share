<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - upcshare</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 24px;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 48px 36px;
            box-shadow: var(--shadow-lg);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 8px;
        }
        .auth-logo svg {
            color: var(--accent);
        }
        .auth-title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .auth-subtitle {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        .auth-form .form-group {
            margin-bottom: 18px;
        }
        .auth-form .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .auth-form .form-input {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            color: var(--text-primary);
            background: var(--bg);
            outline: none;
            transition: var(--transition);
        }
        .auth-form .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        .auth-btn {
            width: 100%;
            height: 44px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }
        .auth-btn:hover {
            background: var(--accent-hover);
        }
        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--accent);
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .auth-error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: var(--danger);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .password-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 4px;
        }
        .password-toggle:hover {
            color: var(--text-secondary);
        }
        .password-hint {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }
        .strength-bar {
            height: 3px;
            border-radius: 2px;
            background: var(--border);
            margin-top: 8px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            border-radius: 2px;
            transition: all 0.3s;
            width: 0;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
            </div>
            <h1 class="auth-title">创建账号</h1>
            <p class="auth-subtitle">注册后可上传和下载学科资料</p>

            <div class="auth-error" id="errorMsg"></div>

            <form class="auth-form" id="registerForm" onsubmit="return false;">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="username" placeholder="2-20 个字符" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="至少 6 个字符" autocomplete="new-password" required oninput="checkStrength()">
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="confirmPassword" placeholder="再次输入密码" autocomplete="new-password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="auth-btn" id="registerBtn">注 册</button>
            </form>

            <div class="auth-footer">
                已有账号？<a href="/login">返回登录</a>
            </div>
        </div>
    </div>

    <script>
        const errorMsg = document.getElementById('errorMsg');

        document.getElementById('registerForm').addEventListener('submit', async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('registerBtn');

            if (!username || !password || !confirm) { showError('请填写所有字段'); return; }
            if (password !== confirm) { showError('两次输入的密码不一致'); return; }
            if (password.length < 6) { showError('密码长度至少 6 个字符'); return; }

            btn.disabled = true; btn.textContent = '注册中...';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();
                if (res.ok && data.ok) {
                    location.href = '/login?registered=1';
                } else {
                    showError(data.msg || '注册失败');
                }
            } catch { showError('网络错误'); }
            finally { btn.disabled = false; btn.textContent = '注 册'; }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        function togglePassword(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        function checkStrength() {
            const pwd = document.getElementById('password').value;
            const fill = document.getElementById('strengthFill');
            let score = 0;
            if (pwd.length >= 6) score++;
            if (pwd.length >= 10) score++;
            if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
            if (/\d/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;

            const pct = Math.min(score / 5 * 100, 100);
            const colors = ['#ff3b30', '#ff9500', '#ffcc00', '#34c759', '#34c759'];
            fill.style.width = pct + '%';
            fill.style.background = colors[Math.min(score, 4)];
        }
    </script>
</body>
</html>
