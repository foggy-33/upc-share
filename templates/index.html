<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>upc-share</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                <span>upc-share</span>
            </a>
            <div class="nav-search">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索课件、资料、文档..." autocomplete="off">
                <kbd class="search-kbd">Ctrl+K</kbd>
            </div>
            <div class="nav-links">
                <a href="/admin" class="nav-link">上传资料</a>
                {% if user %}
                    <span class="nav-link" style="color:var(--text-tertiary);">{{ user.username }}</span>
                    <a href="#" class="nav-link" onclick="logout()"/>退出</a>
                {% else %}
                    <a href="/login" class="nav-link">登录</a>
                    <a href="/register" class="nav-link">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            
            <p class="hero-subtitle">课件、习题、笔记、复习资料，一站整合</p>
            <!-- 统计卡片 -->
            <div class="stats-row" id="statsRow">
                <div class="stat-item">
                    <span class="stat-value" id="statSubjects">-</span>
                    <span class="stat-label">学科</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="statFiles">-</span>
                    <span class="stat-label">文件</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="statSize">-</span>
                    <span class="stat-label">总大小</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="statDownloads">-</span>
                    <span class="stat-label">累计下载</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 学科卡片 (默认视图) -->
    <section class="subjects-section" id="subjectsSection">
        <div class="container">
            <h2 class="section-title">全部学科</h2>
            <div class="subjects-grid" id="subjectsGrid"></div>
        </div>
    </section>

    <!-- 文件浏览 (选中学科后显示) -->
    <section class="files-section" id="filesSection" style="display:none;">
        <div class="container">
            <!-- 面包屑 -->
            <div class="breadcrumb" id="breadcrumb">
                <a href="#" class="breadcrumb-home" id="breadcrumbHome">全部学科</a>
                <span class="breadcrumb-sep">›</span>
                <span class="breadcrumb-current" id="breadcrumbCurrent"></span>
            </div>

            <!-- 类型筛选 -->
            <div class="filter-bar" id="filterBar">
                <button class="filter-btn active" data-ext="">全部类型</button>
                <button class="filter-btn" data-ext="pdf">PDF</button>
                <button class="filter-btn" data-ext="doc">Word</button>
                <button class="filter-btn" data-ext="zip">ZIP</button>
                <button class="filter-btn" data-ext="rar">RAR</button>
                <button class="filter-btn" data-ext="ppt">PPT</button>
                <button class="filter-btn" data-ext="xls">Excel</button>
            </div>

            <!-- 子文件夹 -->
            <div class="folders-row" id="foldersRow" style="display:none;"></div>

            <!-- 文件表格 -->
            <div class="files-header">
                <h2 class="section-title" id="filesSectionTitle">文件列表</h2>
                <span class="file-count" id="fileCount"></span>
            </div>
            <div class="file-table-wrap">
                <table class="file-table" id="fileTable">
                    <thead>
                        <tr>
                            <th class="col-name">文件名</th>
                            <th class="col-size">大小</th>
                            <th class="col-date">日期</th>
                            <th class="col-dl">下载次数</th>
                            <th class="col-action"></th>
                        </tr>
                    </thead>
                    <tbody id="fileTableBody"></tbody>
                </table>
            </div>

            <!-- 空状态 -->
            <div class="empty-state" id="emptyState" style="display:none;">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                <p>该分类下暂无文件</p>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination"></div>
        </div>
    </section>

    <!-- 搜索结果 (搜索时显示) -->
    <section class="files-section" id="searchSection" style="display:none;">
        <div class="container">
            <div class="files-header">
                <h2 class="section-title" id="searchTitle">搜索结果</h2>
                <span class="file-count" id="searchCount"></span>
            </div>
            <div class="file-table-wrap">
                <table class="file-table">
                    <thead>
                        <tr>
                            <th class="col-name">文件名</th>
                            <th class="col-subject">学科</th>
                            <th class="col-size">大小</th>
                            <th class="col-date">日期</th>
                            <th class="col-action"></th>
                        </tr>
                    </thead>
                    <tbody id="searchTableBody"></tbody>
                </table>
            </div>
            <div class="empty-state" id="searchEmpty" style="display:none;">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <p>未找到匹配的文件</p>
            </div>
            <div class="pagination" id="searchPagination"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 upc-share · Powered by FastAPI</p>
        </div>
    </footer>

    <script>
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            location.reload();
        }
    </script>
    <script src="/static/js/app.js"></script>
</body>
</html>
