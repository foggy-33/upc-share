# ── 安全限制（放在 server 块之前）──────────────────────
# 上传频率限制：每个 IP 每分钟最多 6 次上传请求（burst 允许瞬时 3 个排队）
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=6r/m;

# API 请求频率限制：每个 IP 每秒 10 次
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# 登录/注册防暴力破解：每个 IP 每分钟最多 10 次
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# 单 IP 最大并发连接数
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── HTTP (80) → HTTPS (443) 重定向 ──────────────────────
server {
    listen 80;
    server_name upcshare.cn www.upcshare.cn;
    return 301 https://$host$request_uri;
}

# ── HTTPS (443) 主站点 ──────────────────────────────────
server {
    listen 443 ssl http2;
    server_name upcshare.cn www.upcshare.cn;

    # SSL 证书配置（Cloudflare Origin Certificate）
    ssl_certificate /etc/nginx/ssl/upcshare.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/upcshare.cn.key;

    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 200M;  # 与 FastAPI 上传限制一致

    # 全局：单 IP 最多 20 个并发连接
    limit_conn conn_limit 20;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;

        # API 请求限流
        limit_req zone=api_limit burst=20 nodelay;
    }

    # 上传接口：严格限流 + 限并发
    location /api/upload {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # 每分钟最多 6 次上传，允许突发 3 个排队
        limit_req zone=upload_limit burst=3 nodelay;
        # 单 IP 同时最多 2 个上传连接
        limit_conn conn_limit 2;
    }

    # 登录/注册接口：防暴力破解
    location /api/auth/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=auth_limit burst=5 nodelay;
    }

    # 下载接口：限速 + 限并发
    location /api/download/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;

        # 单 IP 同时最多 3 个下载连接
        limit_conn conn_limit 3;
        # 每个连接限速 5MB/s（总带宽 100Mbps ≈ 12.5MB/s，留余量给其他用户）
        limit_rate 5m;
    }

    # 静态文件由 Nginx 处理
    location /static/ {
        alias /opt/download-site/static/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
